services:
  db:
    image: postgres:16-alpine
    container_name: smart_crm_db
    restart: always
    environment:
      POSTGRES_USER: crm_admin
      POSTGRES_PASSWORD: crm_password
      POSTGRES_DB: smart_crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
